<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
    <style>
        .policy-sidebar .active {
            font-weight: bold;
            color: #000 !important;
            border-left: 3px solid #000;
            padding-left: 10px;
        }
        .policy-content-area {
            min-height: 500px;

        .policy-content-area h2 {

            letter-spacing: 1px;
        }

<body class="bg-light">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Logic tải nội dung sẽ nằm trong app.js gọi hàm cụ thể
            if (typeof renderPolicyContent === 'function') {
                renderPolicyContent();
            }
        });
