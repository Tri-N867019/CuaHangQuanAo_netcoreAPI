<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - NT Clothing</title>
    <!-- Thư viện Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 40px;
            background: #fff;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Header tự động -->
    <div id="app-header"></div>

    <div class="container-fluid py-5">
        <div class="auth-container shadow-sm">
            <h2 class="text-center fw-bolder mb-4 letter-spacing-1">ĐĂNG KÝ</h2>
            
            <p id="register-message" class="text-center mb-3 fw-bold" style="display: none;"></p>

            <form id="form-dangky">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary fs-14">Họ và Tên *</label>
                    <input type="text" id="reg-fullname" class="form-control rounded-0 border-secondary shadow-none py-2" required placeholder="Nhập họ và tên...">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary fs-14">Email *</label>
                    <input type="email" id="reg-email" class="form-control rounded-0 border-secondary shadow-none py-2" required placeholder="Nhập địa chỉ email...">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary fs-14">Tên đăng nhập *</label>
                    <input type="text" id="reg-username" class="form-control rounded-0 border-secondary shadow-none py-2" required placeholder="Nhập tên đăng nhập ghi liền...">
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary fs-14">Mật khẩu *</label>
                    <input type="password" id="reg-password" class="form-control rounded-0 border-secondary shadow-none py-2" required placeholder="Nhập mật khẩu...">
                </div>
                
                <button type="submit" class="btn btn-dark w-100 rounded-0 py-2 fw-bold letter-spacing-1" id="btn-register-submit">
                    TẠO TÀI KHOẢN
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="fs-14 text-secondary mb-1">Bạn đã có tài khoản?</p>
                <a href="dang-nhap.html" class="text-dark fw-bold text-decoration-underline text-uppercase fs-14">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <!-- Footer tự động -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
