<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Quần Áo</title>
    <!-- Thư viện Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Thư viện Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- CSS Tự viết (Đã được chuyển về đúng vị trí) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Nơi chèn tự động Header -->
    <div id="app-header"></div>


    <!-- KHU VỰC CHÍNH BỘ LỌC VÀ NHÓM SẢN PHẨM -->
    <div class="container-fluid px-5 mt-4 mb-5">
        <div class="row">
            
            <!-- CỘT TRÁI: BỘ LỌC -->
            <div class="col-lg-3 pe-lg-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0 fs-6">BỘ LỌC</h5>
                    <i class="bi bi-arrow-left cursor-pointer"></i>
                </div>

                <!-- Thương hiệu -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold fs-13">THƯƠNG HIỆU</span>
                        <i class="bi bi-dash text-secondary"></i>
                    </div>
                    <!-- Sẽ được đổ động từ API -->
                    <div id="filter-brands">
                        <div class="text-center w-100"><small class="text-secondary">Đang tải...</small></div>
                    </div>
                </div>

                <!-- Màu sắc -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold fs-13">MÀU SẮC</span>
                        <i class="bi bi-dash text-secondary"></i>
                    </div>
                    <div class="d-flex flex-wrap gap-2" id="filter-colors">
                        <!-- Màu sắc sẽ được đổ động từ API bằng JS -->
                        <div class="text-center w-100"><small class="text-secondary">Đang tải...</small></div>
                    </div>
                </div>

                <!-- Loại Sản phẩm -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold fs-13">LOẠI SẢN PHẨM</span>
                        <i class="bi bi-dash text-secondary"></i>
                    </div>
                    <!-- Sẽ được đổ động từ API -->
                    <div id="filter-categories" class="row g-1">
                        <div class="text-center w-100"><small class="text-secondary">Đang tải...</small></div>
                    </div>
                </div>

                <!-- Khuyến Mãi (SALE) -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold fs-13">TRẠNG THÁI</span>
                        <i class="bi bi-dash text-secondary"></i>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="filter-sale">
                        <label class="form-check-label text-secondary fs-13" for="filter-sale">Chỉ hiện Hàng Đang Sale</label>
                    </div>
                </div>

                <!-- Khoảng giá -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold fs-13">KHOẢNG GIÁ (VNĐ)</span>
                        <i class="bi bi-dash text-secondary"></i>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input price-filter" type="radio" name="priceRange" value="-" id="price0" checked>
                        <label class="form-check-label fw-bold text-dark fs-13" for="price0">Tất cả mức giá</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input price-filter" type="radio" name="priceRange" value="0-500000" id="price1">
                        <label class="form-check-label text-secondary fs-13" for="price1">Dưới 500,000đ</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input price-filter" type="radio" name="priceRange" value="500000-1000000" id="price2">
                        <label class="form-check-label text-secondary fs-13" for="price2">500,000đ - 1,000,000đ</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input price-filter" type="radio" name="priceRange" value="1000000-2000000" id="price3">
                        <label class="form-check-label text-secondary fs-13" for="price3">1,000,000đ - 2,000,000đ</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input price-filter" type="radio" name="priceRange" value="2000000-" id="price4">
                        <label class="form-check-label text-secondary fs-13" for="price4">Trên 2,000,000đ</label>
                    </div>
                </div>
            </div>

            <!-- CỘT PHẢI: LƯỚI SẢN PHẨM -->
            <div class="col-lg-9">
                <!-- Thanh hiển thị Bộ Lọc Đang Chọn & Sắp Xếp -->
                <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 border-bottom pb-4">
                    <div class="d-flex flex-wrap gap-2 align-items-center" id="active-filters">
                        <!-- JS sẽ đổ dữ liệu các filter đang chọn vào đây -->
                    </div>
                    
                    <div class="d-flex align-items-center gap-3 ms-auto mt-3 mt-md-0">
                        <span class="fs-13 text-secondary" id="product-count">Đang tính...</span>
                        <select class="form-select w-auto border-0 text-dark fw-bold shadow-none fs-13 bg-transparent p-0 pe-3" style="cursor: pointer;">
                            <option>SẮP XẾP</option>
                            <option>Mới nhất</option>
                            <option>Giá: Thấp đến cao</option>
                            <option>Giá: Cao đến thấp</option>
                        </select>
                    </div>
                </div>

                <div class="row" id="danh-sach-san-pham">
                    <div class="text-center mt-5">
                        <div class="spinner-border text-dark" role="status"></div>
                        <p class="mt-3">Đang tải sản phẩm...</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Nơi chèn tự động Footer -->
    <div id="app-footer"></div>

    <!-- Nơi gọi file JS của Bootstrap và JS tự viết -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
