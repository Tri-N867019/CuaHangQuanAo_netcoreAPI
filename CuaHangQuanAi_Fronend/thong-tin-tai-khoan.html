<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Tài Khoản - NT Clothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        #edit-profile-map {
            height: 300px;
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            border: 2px solid #eee;
        }
        #edit-profile-map.verified { border-color: #10b981; }
        #edit-profile-map.unverified { border-color: #ef4444; }
    </style>
</head>
<body class="bg-light">

    <div id="app-header"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body text-center p-4">
                        <div class="position-relative d-inline-block mb-3">
                            <img id="profile-img-large" src="images/login.png" class="rounded-circle" style="width: 100px; height: 100px; background: #eee; object-fit: cover;">
                            <div class="position-absolute bottom-0 end-0">
                                <label for="avatar-input" class="btn btn-sm btn-dark rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; cursor: pointer;">
                                    <i class="bi bi-camera"></i>
                                </label>
                                <input type="file" id="avatar-input" class="d-none" accept="image/*" onchange="handleAvatarUpload(this)">
                            </div>
                        </div>
                        <h4 id="profile-name" class="fw-bold mb-1">...</h4>
                        <p id="profile-role" class="text-muted mb-3">Thành viên</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-dark btn-sm" onclick="openEditProfileModal()">
                                <i class="bi bi-pencil-square me-2"></i>Chỉnh sửa hồ sơ
                            </button>
                            <button class="btn btn-outline-dark btn-sm" onclick="openChangePasswordModal()">
                                <i class="bi bi-key me-2"></i>Đổi mật khẩu
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="dangXuat()">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <!-- Nav Tabs -->
                <ul class="nav nav-pills mb-4 bg-white p-2 rounded shadow-sm" id="accountTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold px-4" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profile-pane" type="button" role="tab" aria-selected="true">
                            <i class="bi bi-person-circle me-2"></i>Hồ sơ
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold px-4" id="history-tab" data-bs-toggle="pill" data-bs-target="#history-pane" type="button" role="tab" aria-selected="false">
                            <i class="bi bi-bag-check me-2"></i>Lịch sử mua sắm
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content" id="accountTabsContent">
                    <!-- Profile Pane -->
                    <div class="tab-pane fade show active" id="profile-pane" role="tabpanel" aria-labelledby="profile-tab">
                        <div class="card border-0 shadow-sm p-4 mb-4">
                            <h5 class="fw-bold mb-4">Thông Tin Cơ Bản</h5>
                            <div id="profile-info-content">
                                <div class="spinner-border text-dark" role="status"></div>
                            </div>
                        </div>
                    </div>

                    <!-- History Pane -->
                    <div class="tab-pane fade" id="history-pane" role="tabpanel" aria-labelledby="history-tab">
                        <div class="card border-0 shadow-sm p-4">
                            <h5 class="fw-bold mb-4">Lịch Sử Mua Hàng</h5>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr style="font-size: 13px;">
                                            <th>MÃ ĐƠN</th>
                                            <th>NGÀY ĐẶT</th>
                                            <th>TỔNG TIỀN</th>
                                            <th>TRẠNG THÁI</th>
                                            <th>THAO TÁC</th>
                                        </tr>
                                    </thead>
                                    <tbody id="order-history-body" style="font-size: 14px;">
                                        <tr>
                                            <td colspan="5" class="text-center py-4 text-muted">Đang tải lịch sử đơn hàng...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
