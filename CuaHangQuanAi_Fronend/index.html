<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT Clothing - Định Hình Phong Cách</title>
    <!-- Thư viện Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Nơi chèn tự động Header -->
    <div id="app-header"></div>

    <!-- ==================== KHÚC NÀY NẾU GIÁO VIÊN HỎI THÌ SỬA Ở ĐÂY ==================== -->
    <!-- 1. HERO BANNER -->
    <div class="hero-banner mb-5">
        <div>
           <h1 class="display-3 fw-bolder mb-3 letter-spacing-2">BỘ SƯU TẬP MÙA HÈ 2026</h1>
            
            <p class="lead mb-4">Khám phá phong cách thanh lịch, hiện đại dành riêng cho bạn.</p>
            
            <a href="san-pham.html" class="btn btn-light btn-lg px-5 rounded-0 fw-bold">KHÁM PHÁ NGAY</a>
        </div>
    </div>
    
    <div class="container-fluid px-5 mb-5 pb-4">
        <h2 class="text-center fw-bolder mb-5 letter-spacing-1">MUA SẮM THEO DANH MỤC</h2>
        <div class="row g-4 justify-content-center">
            
            <!-- Ô SỐ 1 -->
            <div class="col-md-3">
                <div class="category-card position-relative bg-dark" onclick="window.location.href='san-pham.html?loaiId=2'">
                    <img src="https://images.unsplash.com/photo-1598033129183-c4f50c736f10?q=80&w=800&auto=format&fit=crop" class="w-100 opacity-75" alt="Áo Nam">
                    <div class="position-absolute top-50 start-50 translate-middle text-center w-100">
                        <h3 class="text-white fw-bold letter-spacing-2">ÁO NAM</h3>
                        <span class="text-white text-decoration-underline fs-14">XEM THÊM</span>
                    </div>
                </div>
            </div>
            
            <!-- Ô SỐ 2 -->
            <div class="col-md-3">
                <div class="category-card position-relative bg-dark" onclick="window.location.href='san-pham.html?loaiId=6'">
                    <img src="https://images.unsplash.com/photo-1473966968600-fa801b869a1a?q=80&w=800&auto=format&fit=crop" class="w-100 opacity-75" alt="Quần Nam">
                    <div class="position-absolute top-50 start-50 translate-middle text-center w-100">
                        <h3 class="text-white fw-bold letter-spacing-2">QUẦN NAM</h3>
                        <span class="text-white text-decoration-underline fs-14">XEM THÊM</span>
                    </div>
                </div>
            </div>
            
            <!-- Ô SỐ 3: ÁO POLO -->
            <div class="col-md-3">
                <div class="category-card position-relative bg-dark" onclick="window.location.href='san-pham.html?loaiId=5'">
                    <img src="https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?q=80&w=800&auto=format&fit=crop" class="w-100 opacity-75" alt="Áo Polo Nam">
                    <div class="position-absolute top-50 start-50 translate-middle text-center w-100">
                        <h3 class="text-white fw-bold letter-spacing-2">ÁO POLO</h3>
                        <span class="text-white text-decoration-underline fs-14">XEM THÊM</span>
                    </div>
                </div>
            </div>


        </div>
    </div>
    <!-- ==================== HẾT KHU VỰC SỬA TAY ==================== -->

    <div class="container mb-5 pb-5 border-bottom">

        </div>
        
        <div class="row" id="danh-sach-san-pham">
            <!-- JS sẽ tự động lấy 4 món mới nhất nhét vào đây -->
            <div class="col-12 text-center my-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="mt-2 text-secondary">Đang tải sản phẩm mới nhất từ hệ thống...</p>
            </div>
        </div>
    </div>

    <!-- 4. FOOTER CỦA TRANG CHỦ -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
