<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - NT Clothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .thumbnail-img {
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .thumbnail-img:hover, .thumbnail-img.active {
            opacity: 1;
            border-color: #000;
        }
        .variant-btn {
            border: 1px solid #ccc;
            background: #fff;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .variant-btn:hover {
            border-color: #000;
        }
        .variant-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Header -->
    <div id="app-header"></div>

    <div class="container bg-white p-4 p-md-5 mt-4 mb-5 rounded shadow-sm">
        <!-- Đường dẫn Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb fs-14">
                <li class="breadcrumb-item"><a href="index.html" class="text-dark text-decoration-none">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="san-pham.html" class="text-dark text-decoration-none">Sản phẩm</a></li>
                <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-name">Đang tải...</li>
            </ol>
        </nav>

        <div class="row" id="product-detail-container">
            <!-- Nơi JS đổ dữ liệu sản phẩm -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="mt-3">Đang tải thông tin sản phẩm...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        // Khi tải xong layout header/footer, gọi hàm lấy chi tiết
        document.addEventListener("DOMContentLoaded", async () => {
            // Lấy ID từ URL
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if(productId) {
                if (typeof layChiTietSanPham === 'function') {
                    layChiTietSanPham(productId);
                } else {
                    console.error("Hàm layChiTietSanPham chưa được định nghĩa trong app.js!");
                }
            } else {
                document.getElementById('product-detail-container').innerHTML = '<div class="col-12 text-center text-danger py-5"><h4>Không tìm thấy mã sản phẩm!</h4><a href="san-pham.html" class="btn btn-dark mt-3">Quay lại cửa hàng</a></div>';
            }
        });
    </script>
</body>
</html>
