<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - NT Clothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        #address-map {
            height: 100%;
            width: 100%;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        #address-map-container {
            height: 250px;
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 2px solid #eee;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        #address-map-container.verified { border-color: #10b981; }
        #address-map-container.unverified { border-color: #ef4444; }
        #address-map.verified {
            border-color: #10b981;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.15);
        }
        #address-map.unverified {
            border-color: #ef4444;
        }
        .verified-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 50px;
            display: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .verified-badge.active {
            display: inline-flex;
            align-items: center;
        }
        .address-box {
            transition: all 0.3s ease;
        }
        .address-box.invalid {
            animation: shake 0.5s;
            border-color: #ef4444;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-light">
    <div id="app-header"></div>

    <div class="container my-4" id="cart-container">
        <h2>Giỏ hàng</h2>
        <div class="text-center mt-5">
            <div class="spinner-border text-dark" role="status"></div>
            <p class="mt-3">Đang tải giỏ hàng...</p>
        </div>
    </div>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>
        let map, marker;
        let isAddressVerified = false;

        async function renderCartPage() {
            const container = document.getElementById('cart-container');
            const token = localStorage.getItem('token');
            let items = [];

            updateCartBadge();

            if (token) {
                try {
                    const res = await authFetch(`GioHang`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        items = data.map(d => ({
                            id: d.id, 
                            ten: d.tenSanPham,
                            mau: d.tenMau,
                            size: d.tenSize,
                            qty: d.soLuong,
                            gia: d.giaBan,
                            thanhTien: d.thanhTien
                        }));
                    }
                } catch (err) {
                    console.error("Lỗi lấy giỏ hàng server:", err);
                }
            } else {
                const localCart = getCart();
                if (localCart && localCart.length > 0) {
                    const detailItems = await Promise.all(localCart.map(async item => {
                        try {
                            const res = await authFetch(`SanPham/chitiet/${item.id}`);
                            if (!res.ok) return null;
                            const p = await res.json();
                            return { 
                                id: item.id, 
                                ten: p.ten, 
                                qty: item.qty, 
                                gia: p.giaBan 
                            };
                        } catch (e) { return null; }
                    }));
                    items = detailItems.filter(x => x !== null);
                }
            }

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info py-4">Giỏ hàng của bạn đang trống. <a href="san-pham.html" class="alert-link">Tiếp tục mua sắm</a>.</div>
                `;
                return;
            }

            const rows = items.map(item => {
                const amount = item.thanhTien || (item.gia * item.qty);
                const bienTheInfo = (item.mau || item.size) ? `<br><small class="text-secondary">Màu: ${item.mau || '-'}, Size: ${item.size || '-'}</small>` : '';
                
                return `
                    <tr>
                        <td class="text-center">
                            <input type="checkbox" class="form-check-input item-checkbox" data-id="${item.id}" data-amount="${amount}" checked onchange="updateSelectedTotal()">
                        </td>
                        <td>
                            <span class="fw-bold text-dark">${item.ten}</span>
                            ${bienTheInfo}
                        </td>
                        <td>${item.qty}</td>
                        <td>${item.gia.toLocaleString('vi-VN')} đ</td>
                        <td>${amount.toLocaleString('vi-VN')} đ</td>
                        <td><button class="btn btn-sm btn-outline-danger" onclick="removeCartItem(${item.id})"><i class="bi bi-trash"></i></button></td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="table-responsive my-3">
                    <table class="table table-bordered align-middle table-hover">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" width="50">
                                    <input type="checkbox" class="form-check-input" id="select-all" checked onchange="toggleSelectAll(this)">
                                </th>
                                <th>Sản phẩm</th>
                                <th>Số lượng</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                        <tfoot>
                            <tr>
                                <th colspan="4" class="text-end">Tổng cộng (Đã chọn)</th>
                                <th colspan="2" class="text-danger fw-bold fs-5" id="selected-total">0 đ</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 border-top border-4 border-primary">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-3"><i class="bi bi-truck me-2"></i>Thông tin giao hàng</h5>
                                <form id="checkout-form">
                                    <div class="mb-3">
                                        <label class="form-label">Tên người nhận *</label>
                                        <input type="text" class="form-control" name="tenNguoiNhan" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Số điện thoại *</label>
                                        <input type="tel" class="form-control" name="SDTNhanHang" required>
                                    </div>
                                    <div class="mb-3">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <label class="form-label mb-0 fw-bold">Địa chỉ nhận hàng *</label>
                                            <span id="address-status-badge" class="badge bg-secondary">
                                                <i class="bi bi-info-circle me-1"></i>Chưa kiểm tra bản đồ
                                            </span>
                                        </div>
                                        <div class="input-group address-box" id="address-input-group">
                                            <textarea class="form-control" name="diaChiGiaoHang" id="diaChiGiaoHang" rows="2" placeholder="Nhập địa chỉ (VD: Ấp, Xã, Phường...) hoặc chọn trên bản đồ" required oninput="onAddressInput()"></textarea>
                                            <button type="button" class="btn btn-primary" id="btn-verify-address" onclick="verifyAddress()">
                                                <i class="bi bi-geo-alt-fill me-1"></i> Kiểm tra
                                            </button>
                                        </div>
                                        <div id="address-map-container" class="mt-3">
                                            <div id="address-map"></div>
                                        </div>
                                        <div class="d-flex justify-content-between mt-2">
                                            <small class="text-muted fs-11"><i class="bi bi-info-circle me-1"></i>Kéo marker hoặc click bản đồ để chọn vị trí</small>
                                            <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none fs-12 fw-bold" onclick="getCurrentLocation()">
                                                <i class="bi bi-crosshair me-1"></i> Sử dụng vị trí của tôi
                                            </button>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Ghi chú</label>
                                        <textarea class="form-control" name="ghiChu" rows="1"></textarea>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 text-end d-flex flex-column justify-content-end align-items-end">
                        <a href="san-pham.html" class="btn btn-outline-secondary mb-2 w-50">Tiếp tục mua sắm</a>
                        
                        <div id="checkout-actions" class="w-100 d-flex flex-column align-items-end">
                            <button class="btn btn-dark mb-2 w-50 btn-checkout-action" onclick="processCheckout('COD')"> <i class="bi bi-cash me-2"></i>Thanh toán khi nhận hàng</button>
                            <button class="btn btn-primary w-50 btn-checkout-action" onclick="processCheckout('VNPAY')"> <i class="bi bi-credit-card me-2"></i>Thanh toán qua VNPAY</button>
                        </div>
                        
                        <div id="admin-notice" class="alert alert-warning fs-13 mt-2 w-50 text-start d-none">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            Tài khoản quản trị không thể đặt hàng. Vui lòng dùng tài khoản Khách để mua sắm.
                        </div>
                    </div>
                </div>
            `;

            const role = localStorage.getItem('role');
            if (role === 'Admin' || role === 'Admin1') {
                document.querySelectorAll('.btn-checkout-action').forEach(b => b.classList.add('d-none'));
                document.getElementById('admin-notice').classList.remove('d-none');
            }

            updateSelectedTotal();
            initAddressMap();
        }

        function initAddressMap() {
            const mapContainer = document.getElementById('address-map');
            if (!mapContainer) return;

            // Vị trí mặc định (Trung tâm TP. Long Xuyên)
            const defaultLat = 10.3759;
            const defaultLng = 105.4325;

            try {
                map = L.map('address-map', {
                    scrollWheelZoom: false // Tránh vô tình zoom khi cuộn trang
                }).setView([defaultLat, defaultLng], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                // Thêm control để bật/tắt scroll zoom
                map.on('focus', () => { map.scrollWheelZoom.enable(); });
                map.on('blur', () => { map.scrollWheelZoom.disable(); });

                marker = L.marker([defaultLat, defaultLng], { 
                    draggable: true,
                    title: "Kéo để chọn vị trí giao hàng"
                }).addTo(map);

                // Khi click bản đồ
                map.on('click', async function(e) {
                    const { lat, lng } = e.latlng;
                    marker.setLatLng([lat, lng]);
                    map.panTo([lat, lng]);
                    await reverseGeocode(lat, lng);
                });

                // Khi kéo marker
                marker.on('dragend', async function(e) {
                    const { lat, lng } = marker.getLatLng();
                    map.panTo([lat, lng]);
                    await reverseGeocode(lat, lng);
                });
                
                isAddressVerified = false; // Trạng thái tìm thấy trên bản đồ
                updateVerificationUI();
            } catch (e) {
                console.error("Lỗi khởi tạo bản đồ:", e);
                mapContainer.innerHTML = '<div class="alert alert-danger">Không thể tải bản đồ. Vui lòng kiểm tra kết nối mạng.</div>';
            }
        }

        function onAddressInput() {
            isAddressVerified = false;
            updateVerificationUI();
        }

        async function getCurrentLocation() {
            if (!navigator.geolocation) return alert("Trình duyệt của bạn không hỗ trợ định vị!");
            
            const btn = document.querySelector('[onclick="getCurrentLocation()"]');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang định vị...';

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    map.setView([latitude, longitude], 16);
                    marker.setLatLng([latitude, longitude]);
                    await reverseGeocode(latitude, longitude);
                    btn.innerHTML = originalHtml;
                },
                (err) => {
                    console.error(err);
                    alert("Không thể lấy vị trí. Vui lòng cấp quyền truy cập vị trí cho trình duyệt.");
                    btn.innerHTML = originalHtml;
                }
            );
        }

        async function verifyAddress() {
            const address = document.getElementById('diaChiGiaoHang').value.trim();
            if (!address || address.length < 3) {
                alert("Vui lòng nhập địa chỉ (Ấp/Xã/Phường...) để kiểm tra!");
                return;
            }

            const btn = document.getElementById('btn-verify-address');
            const mapEl = document.getElementById('address-map');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang tìm...';

            try {
                // Thêm "Việt Nam" để tìm kiếm chính xác hơn
                const searchQuery = address.toLowerCase().includes("việt nam") ? address : address + ", Việt Nam";
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}&limit=1&addressdetails=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const { lat, lon, display_name } = data[0];
                    map.setView([lat, lon], 16);
                    marker.setLatLng([lat, lon]);
                    document.getElementById('diaChiGiaoHang').value = display_name;
                    // Hiệu ứng thành công
                    document.getElementById('address-map-container').className = 'mt-3 verified';
                    isAddressVerified = true;
                } else {
                    isAddressVerified = false;
                    alert("Gợi ý: Không tìm thấy vị trí chính xác trên bản đồ. Bạn hãy kiểm tra lại tên Ấp, Xã hoặc có thể cứ tiếp tục đặt hàng với địa chỉ đã nhập.");
                    document.getElementById('address-map-container').className = 'mt-3 unverified';
                }
                updateVerificationUI();
            } catch (error) {
                console.error("Lỗi xác thực:", error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-geo-alt-fill me-1"></i> Kiểm tra';
            }
        }

        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data && data.display_name) {
                    document.getElementById('diaChiGiaoHang').value = data.display_name;
                    isAddressVerified = true;
                } else {
                    isAddressVerified = false;
                }
            } catch (e) { isAddressVerified = false; }
            updateVerificationUI();
        }

        function updateVerificationUI() {
            const badge = document.getElementById('address-status-badge');
            const mapEl = document.getElementById('address-map');
            if (!badge) return;

            if (isAddressVerified) {
                badge.className = "badge bg-success";
                badge.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>Đã xác minh vị trí';
            } else {
                badge.className = "badge bg-warning text-dark";
                badge.innerHTML = '<i class="bi bi-exclamation-triangle me-1"></i>Vị trí chưa chính xác';
            }
            
            // Cập nhật trạng thái nút thanh toán
            updateSelectedTotal(); 
        }

        function toggleSelectAll(masterSource) {
            document.querySelectorAll('.item-checkbox').forEach(cb => {
                cb.checked = masterSource.checked;
            });
            updateSelectedTotal();
        }

        function updateSelectedTotal() {
            let total = 0;
            const checkboxes = document.querySelectorAll('.item-checkbox:checked');
            checkboxes.forEach(cb => {
                total += parseFloat(cb.dataset.amount);
            });
            const display = document.getElementById('selected-total');
            if (display) display.innerText = total.toLocaleString('vi-VN') + ' đ';

            // Cập nhật trạng thái nút thanh toán
            const addressVal = document.getElementById('diaChiGiaoHang')?.value.trim() || "";
            document.querySelectorAll('.btn-checkout-action').forEach(btn => {
                // Chỉ cần địa chỉ không trống và có chọn sản phẩm là cho đặt hàng
                btn.disabled = (checkboxes.length === 0 || addressVal.length < 5);
            });

            // Cập nhật select-all checkbox
            const all = document.querySelectorAll('.item-checkbox');
            const selectAll = document.getElementById('select-all');
            if (selectAll) selectAll.checked = all.length > 0 && checkboxes.length === all.length;
        }

        async function removeCartItem(id) {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await authFetch(`GioHang/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        renderCartPage();
                    } else {
                        const err = await res.text();
                        alert("Lỗi: " + err);
                    }
                } catch (e) {
                    console.error("Lỗi xóa sản phẩm:", e);
                }
            } else {
                const cart = getCart().filter(item => item.id !== id);
                setCart(cart);
                updateCartBadge();
                renderCartPage();
            }
        }

        async function processCheckout(method) {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');

            if (role === 'Admin' || role === 'Admin1') {
                alert('Tài khoản quản trị không thể đặt hàng. Vui lòng sử dụng tài khoản Khách hàng.');
                return;
            }

            if (!token) {
                alert('Vui lòng đăng nhập trước khi thanh toán.');
                window.location.href = 'dang-nhap.html';
                return;
            }

            const selectedIds = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            if (selectedIds.length === 0) {
                alert('Vui lòng chọn ít nhất một sản phẩm để thanh toán.');
                return;
            }

            const form = document.getElementById('checkout-form');
            if (form.querySelector('[name="diaChiGiaoHang"]').value.trim().length < 5) {
                alert('Vui lòng nhập địa chỉ giao hàng cụ thể!');
                document.getElementById('diaChiGiaoHang').focus();
                return;
            }

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            const checkoutData = {
                cartItemIds: selectedIds,
                tenNguoiNhan: formData.get('tenNguoiNhan').trim(),
                SDTNhanHang: formData.get('SDTNhanHang').trim(),
                diaChiGiaoHang: formData.get('diaChiGiaoHang').trim(),
                ghiChu: formData.get('ghiChu').trim(),
                phuongThucThanhToan: method
            };

            if (checkoutData.tenNguoiNhan.length < 2) return alert('Tên người nhận phải có ít nhất 2 ký tự!');
            const phoneRegex = /^(0|84)(3|5|7|8|9)([0-9]{8})$/;
            if (!phoneRegex.test(checkoutData.SDTNhanHang)) return alert('Số điện thoại nhận hàng không hợp lệ (10 số)!');
            if (checkoutData.diaChiGiaoHang.length < 5) return alert('Địa chỉ giao hàng quá ngắn!');

            try {
                const res = await authFetch('HoaDon/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(checkoutData)
                });

                if (res.ok) {
                    if (method === 'VNPAY') {
                        alert('Đang chuyển hướng sang VNPAY...');
                        const historyRes = await authFetch('HoaDon/lich-su');
                        const history = await historyRes.json();
                        const latestOrder = history[0]; 
                        
                        const vnpayRes = await authFetch(`Payment/create-vnpay-url/${latestOrder.id}`);
                        const vnpayData = await vnpayRes.json();
                        window.location.href = vnpayData.url;
                    } else {
                        alert('Đặt hàng thành công! Cảm ơn bạn.');
                        renderCartPage(); // Tải lại giỏ hàng vì một số món đã mất
                    }
                } else {
                    const errMsg = await res.text();
                    alert('Lỗi đặt hàng: ' + errMsg);
                }
            } catch (err) {
                console.error(err);
                alert('Lỗi hệ thống khi thanh toán.');
            }
        }


        document.addEventListener('DOMContentLoaded', async () => {
            await renderCartPage();
        });
    </script>
</body>
</html>
