<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - NT Clothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 450px; margin: 50px auto; padding: 40px; background: #fff; border: 1px solid #dee2e6; }
        .link-back { font-size: 13px; }
    </style>
</head>
<body class="bg-light">

    <div id="app-header"></div>

    <div class="container-fluid py-5">
        <div class="auth-container shadow-sm">
            <h2 class="text-center fw-bolder mb-4 letter-spacing-1">QUÊN MẬT KHẨU</h2>
            <p id="forgot-password-message" class="text-center mb-3 fw-bold" style="display: none;"></p>

            <form id="form-quen-mat-khau">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary fs-14">Email đăng ký *</label>
                    <input type="email" id="fp-email" class="form-control rounded-0 border-secondary shadow-none py-2" required placeholder="Nhập email đã đăng ký...">
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-0 py-2 fw-bold letter-spacing-1">GỬI YÊU CẦU</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <a href="dang-nhap.html" class="link-back">« Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
